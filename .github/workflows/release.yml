name: Release
on:
  push:
    tags: ["v*"]
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Release STS2 Mod
        uses: iouter/iouter_actions/sts2/release@master
        with:
          project-name: ${{ github.event.repository.name }}
